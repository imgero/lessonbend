<!doctype html><html data-lessonbend-shell="hybrid-sector-v3"><head><meta charset="utf-8"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; media-src data:; connect-src 'none'; form-action 'none'; base-uri 'none'"><style>body{margin:0;font:18px system-ui;background:#fffaf0;color:#17324d}main{max-width:720px;margin:auto;padding:24px}.card{background:#fff;border:1px solid #d8e0e8;border-radius:18px;padding:22px}.choice{font:inherit;cursor:pointer;border:2px solid #789;border-radius:12px;padding:12px;background:#fff;margin:6px}.sector{fill:#fff;stroke:#345;stroke-width:2;cursor:pointer}.sector.selected{fill:#fbbf24;stroke-width:4}.feedback{margin-top:16px;padding:14px;border-radius:12px;font-weight:700}.success{color:#166534;background:#dcfce7;border:2px solid #4ade80}.retry{color:#92400e;background:#fef3c7;border:2px solid #f59e0b}.worked{background:#eef6fc;border-left:5px solid #2563eb;padding:12px;border-radius:8px}.progress{color:#51647a;font-size:.85em}.audio #intro{display:none}</style></head><body class="audio"><main><div class="card"><h1>Blueberry Listening Route: Same Amount, New Fraction Name</h1><p id="intro">Listen first, then use same-size fraction circles to show that equivalent fractions name the same amount of one whole.</p><button id="audio" hidden>▶ Replay directions</button><p class="progress" id="progress"></p><section id="stage"></section><div id="feedback" aria-live="polite"></div></div></main><script>const module={"title":"Blueberry Listening Route: Same Amount, New Fraction Name","intro":"Listen first, then use same-size fraction circles to show that equivalent fractions name the same amount of one whole.","audioText":"Replay any numbered direction as needed. 1. Equal parts: Select every circle description whose regions are all the same size. Select all answers before pressing Check. 2. Model three fourths: The denominator four means four equal regions. The numerator three means shade three regions. 3. Match: Pair","vocabulary":[{"term":"whole","meaning":"One complete circle."},{"term":"equal parts","meaning":"Regions of a whole that are the same size."},{"term":"denominator","meaning":"The number of equal parts in one whole."},{"term":"numerator","meaning":"The number of equal parts being considered or shaded."}],"steps":[{"checkpointId":"equal-parts","kind":"select","prompt":"Listen: Which circles have equal parts? Select all, then press Check.","denominator":null,"correctNumerator":null,"choices":[{"label":"A circle divided into 2 same-size halves","correct":true},{"label":"A circle divided into 3 regions of different sizes","correct":false},{"label":"A circle divided into 4 same-size fourths","correct":true},{"label":"A circle with 4 regions, including one tiny region","correct":false}],"pairs":null,"retryNextMove":"Replay the direction. Compare the sizes of the enclosed regions, not the number of partition lines."},{"checkpointId":"model-a-fraction","kind":"shade","prompt":"Listen: Make 3/4. The whole has 4 equal parts. Shade 3 parts.","denominator":4,"correctNumerator":3,"choices":null,"pairs":null,"retryNextMove":"Touch and count all 4 equal regions, then shade exactly 3 of them."},{"checkpointId":"recognize-equivalence","kind":"match","prompt":"Listen: Match each circle to a same-size circle with the same shaded amount.","denominator":null,"correctNumerator":null,"choices":null,"pairs":[{"left":"1 of 2 equal parts shaded","right":"2 of 4 equal parts shaded"},{"left":"1 of 3 equal parts shaded","right":"2 of 6 equal parts shaded"},{"left":"3 of 4 equal parts shaded","right":"6 of 8 equal parts shaded"}],"retryNextMove":"Compare the shaded area of same-size wholes. Different numbers can name the same amount."},{"checkpointId":"create-equivalence","kind":"shade","prompt":"Listen: Start with one shaded half. Split both halves into 2 equal pieces without moving the shaded boundary. Shade the 2 fourths that still cover that half.","denominator":4,"correctNumerator":2,"choices":null,"pairs":null,"retryNextMove":"Keep the original half shaded. After both halves are split, that shaded half contains exactly 2 of the 4 equal parts."},{"checkpointId":"create-equivalence","kind":"select","prompt":"Listen: Record the repartitioned model. Select the equation that names the unchanged shaded amount.","denominator":null,"correctNumerator":null,"choices":[{"label":"1/2 = 2/4","correct":true},{"label":"1/2 = 1/4","correct":false},{"label":"1/2 = 2/3","correct":false}],"pairs":null,"retryNextMove":"The shaded amount did not change. One shaded half became 2 shaded pieces out of 4 equal pieces."}],"adaptations":{"audio":true,"minimalText":true,"workedExample":false}};let step=0,port,token;const stage=document.querySelector('#stage'),feedback=document.querySelector('#feedback');function send(type,x={}){if(port)port.postMessage({type,token,...x})}window.addEventListener('message',e=>{if(e.data?.type==='lessonbend.init'&&e.ports[0]){token=e.data.token;port=e.ports[0];send('lessonbend.ready')}},{once:true});const audio=document.querySelector('#audio');if(module.adaptations.audio&&module.audioText&&speechSynthesis){audio.hidden=false;audio.onclick=()=>speechSynthesis.speak(new SpeechSynthesisUtterance(module.audioText))}function result(ok,s){feedback.className='feedback '+(ok?'success':'retry');feedback.innerHTML=ok?'✓ <b>Correct!</b> '+s.retryNextMove:'↻ <b>Try again.</b> '+s.retryNextMove;send('lessonbend.checkpoint',{checkpointId:s.checkpointId,outcome:ok?'mastered':'retry'});if(ok)setTimeout(()=>{step++;render()},800)}function path(i,n){let a=i*6.283/n-1.571,b=(i+1)*6.283/n-1.571,x=t=>100+90*Math.cos(t),y=t=>100+90*Math.sin(t);return 'M100 100 L'+x(a)+' '+y(a)+' A90 90 0 0 1 '+x(b)+' '+y(b)+' Z'}function render(){if(step>=module.steps.length){stage.innerHTML='<h2>Lesson complete</h2>';send('lessonbend.complete');return}let s=module.steps[step],n=s.denominator||2,chosen=new Set();document.querySelector('#progress').textContent='Step '+(step+1)+' of '+module.steps.length;stage.innerHTML='<h2>'+s.prompt+'</h2>';if(s.kind==='shade'){stage.innerHTML+='<svg viewBox="0 0 200 200" width="280">'+Array.from({length:n},(_,i)=>'<path class="sector" data-i="'+i+'" d="'+path(i,n)+'" tabindex="0" role="button" aria-pressed="false"></path>').join('')+'</svg><button class="choice" id="check">Check</button>';stage.querySelectorAll('.sector').forEach(p=>p.onclick=()=>{let i=+p.dataset.i;chosen.has(i)?chosen.delete(i):chosen.add(i);p.classList.toggle('selected');p.setAttribute('aria-pressed',chosen.has(i))});stage.querySelector('#check').onclick=()=>result(chosen.size===s.correctNumerator,s)}else{let items=s.kind==='select'?(s.choices||[]):(s.pairs||[]).map(p=>({label:p.left+' = '+p.right,correct:true}));stage.innerHTML+=items.map((x,i)=>'<button class="choice" data-i="'+i+'">'+x.label+'</button>').join('');stage.querySelectorAll('.choice').forEach((b,i)=>b.onclick=()=>result(items[i].correct,s))}}render()</script></body></html>
