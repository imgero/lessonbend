<!doctype html><html data-lessonbend-shell="hybrid-sector-v3"><head><meta charset="utf-8"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; media-src data:; connect-src 'none'; form-action 'none'; base-uri 'none'"><style>body{margin:0;font:18px system-ui;background:#fffaf0;color:#17324d}main{max-width:720px;margin:auto;padding:24px}.card{background:#fff;border:1px solid #d8e0e8;border-radius:18px;padding:22px}.choice{font:inherit;cursor:pointer;border:2px solid #789;border-radius:12px;padding:12px;background:#fff;margin:6px}.sector{fill:#fff;stroke:#345;stroke-width:2;cursor:pointer}.sector.selected{fill:#fbbf24;stroke-width:4}.feedback{margin-top:16px;padding:14px;border-radius:12px;font-weight:700}.success{color:#166534;background:#dcfce7;border:2px solid #4ade80}.retry{color:#92400e;background:#fef3c7;border:2px solid #f59e0b}.worked{background:#eef6fc;border-left:5px solid #2563eb;padding:12px;border-radius:8px}.progress{color:#51647a;font-size:.85em}.audio #intro{display:none}</style></head><body class=""><main><div class="card"><h1>Mango Route: Same Whole, Same Amount</h1><p id="intro">Start with a worked example, then use precise fraction language to recognize, create, and explain equivalent fractions with same-size circles.</p><button id="audio" hidden>▶ Replay directions</button><div class="worked"><b>Worked example</b><br>1/2 = 2/4: same amount, equal-sized whole.</div><p class="progress" id="progress"></p><section id="stage"></section><div id="feedback" aria-live="polite"></div></div></main><script>const module={"title":"Mango Route: Same Whole, Same Amount","intro":"Start with a worked example, then use precise fraction language to recognize, create, and explain equivalent fractions with same-size circles.","audioText":"Start with a worked example, then use precise fraction language to recognize, create, and explain equivalent fractions with same-size circles.","vocabulary":[{"term":"whole","meaning":"One complete circle."},{"term":"equal parts","meaning":"Parts of a whole that are the same size."},{"term":"denominator","meaning":"The number of equal parts in one whole."},{"term":"numerator","meaning":"The number of equal parts being considered or shaded."}],"steps":[{"checkpointId":"equal-parts","kind":"select","prompt":"Worked example: A valid fraction circle must have equal-size regions. Select every description that shows a circle divided into equal parts.","denominator":null,"correctNumerator":null,"choices":[{"label":"A circle divided into 2 same-size regions","correct":true},{"label":"A circle divided into 3 regions of different sizes","correct":false},{"label":"A circle divided into 4 same-size regions","correct":true}],"pairs":null,"retryNextMove":"Count enclosed regions, not partition lines, and check that every region is the same size."},{"checkpointId":"model-a-fraction","kind":"shade","prompt":"Shade 3/4 of the circle. The denominator 4 means four equal parts; the numerator 3 means shade three parts.","denominator":4,"correctNumerator":3,"choices":null,"pairs":null,"retryNextMove":"Use the denominator to count all equal parts, then use the numerator to count the parts to shade."},{"checkpointId":"recognize-equivalence","kind":"select","prompt":"Use same-size circles. Select every pair that covers the same amount of the same whole.","denominator":null,"correctNumerator":null,"choices":[{"label":"1/2 and 2/4","correct":true},{"label":"1/2 and 1/4","correct":false},{"label":"1/3 and 2/6","correct":true}],"pairs":null,"retryNextMove":"Compare shaded area rather than the size of the numbers. Equivalent fractions cover the same amount of the same-size whole."},{"checkpointId":"create-equivalence","kind":"shade","prompt":"Worked example: Begin with 1/2. Split each half into 2 equal pieces, making 4 equal parts without moving the shaded boundary. Shade the number of fourths equivalent to 1/2.","denominator":4,"correctNumerator":2,"choices":null,"pairs":null,"retryNextMove":"Each original half becomes two fourths. Keep the shaded amount fixed and count the smaller shaded parts."},{"checkpointId":"explain-equivalence","kind":"match","prompt":"Complete the explanation of 1/2 = 2/4 by matching each idea to its precise meaning.","denominator":null,"correctNumerator":null,"choices":null,"pairs":[{"left":"same whole","right":"both models use same-size circles"},{"left":"same amount","right":"the shaded regions cover equal areas"},{"left":"repartitioned","right":"each half was split into two equal pieces"},{"left":"equivalent","right":"the fractions name the same amount of one whole"}],"retryNextMove":"Use the frame: “1/2 and 2/4 are equivalent because they cover the same amount of the same whole.” With repartitioning, both numerator and denominator change by the same factor."}],"adaptations":{"audio":false,"minimalText":false,"workedExample":true}};let step=0,port,token;const stage=document.querySelector('#stage'),feedback=document.querySelector('#feedback');function send(type,x={}){if(port)port.postMessage({type,token,...x})}window.addEventListener('message',e=>{if(e.data?.type==='lessonbend.init'&&e.ports[0]){token=e.data.token;port=e.ports[0];send('lessonbend.ready')}},{once:true});const audio=document.querySelector('#audio');if(module.adaptations.audio&&module.audioText&&speechSynthesis){audio.hidden=false;audio.onclick=()=>speechSynthesis.speak(new SpeechSynthesisUtterance(module.audioText))}function result(ok,s){feedback.className='feedback '+(ok?'success':'retry');feedback.innerHTML=ok?'✓ <b>Correct!</b> '+s.retryNextMove:'↻ <b>Try again.</b> '+s.retryNextMove;send('lessonbend.checkpoint',{checkpointId:s.checkpointId,outcome:ok?'mastered':'retry'});if(ok)setTimeout(()=>{step++;render()},800)}function path(i,n){let a=i*6.283/n-1.571,b=(i+1)*6.283/n-1.571,x=t=>100+90*Math.cos(t),y=t=>100+90*Math.sin(t);return 'M100 100 L'+x(a)+' '+y(a)+' A90 90 0 0 1 '+x(b)+' '+y(b)+' Z'}function render(){if(step>=module.steps.length){stage.innerHTML='<h2>Lesson complete</h2>';send('lessonbend.complete');return}let s=module.steps[step],n=s.denominator||2,chosen=new Set();document.querySelector('#progress').textContent='Step '+(step+1)+' of '+module.steps.length;stage.innerHTML='<h2>'+s.prompt+'</h2>';if(s.kind==='shade'){stage.innerHTML+='<svg viewBox="0 0 200 200" width="280">'+Array.from({length:n},(_,i)=>'<path class="sector" data-i="'+i+'" d="'+path(i,n)+'" tabindex="0" role="button" aria-pressed="false"></path>').join('')+'</svg><button class="choice" id="check">Check</button>';stage.querySelectorAll('.sector').forEach(p=>p.onclick=()=>{let i=+p.dataset.i;chosen.has(i)?chosen.delete(i):chosen.add(i);p.classList.toggle('selected');p.setAttribute('aria-pressed',chosen.has(i))});stage.querySelector('#check').onclick=()=>result(chosen.size===s.correctNumerator,s)}else{let items=s.kind==='select'?(s.choices||[]):(s.pairs||[]).map(p=>({label:p.left+' = '+p.right,correct:true}));stage.innerHTML+=items.map((x,i)=>'<button class="choice" data-i="'+i+'">'+x.label+'</button>').join('');stage.querySelectorAll('.choice').forEach((b,i)=>b.onclick=()=>result(items[i].correct,s))}}render()</script></body></html>
