<!doctype html><html data-lessonbend-shell="hybrid-sector-v3"><head><meta charset="utf-8"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; media-src data:; connect-src 'none'; form-action 'none'; base-uri 'none'"><style>body{margin:0;font:18px system-ui;background:#fffaf0;color:#17324d}main{max-width:720px;margin:auto;padding:24px}.card{background:#fff;border:1px solid #d8e0e8;border-radius:18px;padding:22px}.choice{font:inherit;cursor:pointer;border:2px solid #789;border-radius:12px;padding:12px;background:#fff;margin:6px}.sector{fill:#fff;stroke:#345;stroke-width:2;cursor:pointer}.sector.selected{fill:#fbbf24;stroke-width:4}.feedback{margin-top:16px;padding:14px;border-radius:12px;font-weight:700}.success{color:#166534;background:#dcfce7;border:2px solid #4ade80}.retry{color:#92400e;background:#fef3c7;border:2px solid #f59e0b}.worked{background:#eef6fc;border-left:5px solid #2563eb;padding:12px;border-radius:8px}.progress{color:#51647a;font-size:.85em}.audio #intro{display:none}</style></head><body class=""><main><div class="card"><h1>Pineapple Fraction-Circle Loops</h1><p id="intro">Use one same-size circle pair at a time: look, try, and check. Learn how equal parts can have different fraction names while covering the same amount of one whole.</p><button id="audio" hidden>▶ Replay directions</button><p class="progress" id="progress"></p><section id="stage"></section><div id="feedback" aria-live="polite"></div></div></main><script>const module={"title":"Pineapple Fraction-Circle Loops","intro":"Use one same-size circle pair at a time: look, try, and check. Learn how equal parts can have different fraction names while covering the same amount of one whole.","audioText":"Use one same-size circle pair at a time: look, try, and check. Learn how equal parts can have different fraction names while covering the same amount of one whole.","vocabulary":[{"term":"whole","meaning":"One complete circle."},{"term":"equal parts","meaning":"Parts of one whole that are the same size."},{"term":"denominator","meaning":"The number of equal parts in the whole."},{"term":"numerator","meaning":"The number of equal parts being shaded or considered."}],"steps":[{"checkpointId":"equal-parts","kind":"select","prompt":"Select every circle description that shows equal fractional parts.","denominator":null,"correctNumerator":null,"choices":[{"label":"A circle divided into 2 same-size halves","correct":true},{"label":"A circle divided into 3 regions of different sizes","correct":false},{"label":"A circle divided into 4 same-size fourths","correct":true}],"pairs":null,"retryNextMove":"Imagine sharing each circle fairly. Select only circles in which every region would be the same size."},{"checkpointId":"model-a-fraction","kind":"shade","prompt":"The denominator 4 means four equal parts in one circle. Shade 3 parts to model 3/4. The numerator is 3.","denominator":4,"correctNumerator":3,"choices":null,"pairs":null,"retryNextMove":"Count the four equal regions, not the partition lines. Then shade exactly three regions."},{"checkpointId":"recognize-equivalence","kind":"select","prompt":"Each choice compares same-size circles. Select the pair whose shaded regions cover the same amount of one whole.","denominator":null,"correctNumerator":null,"choices":[{"label":"1/2 and 2/4","correct":true},{"label":"1/2 and 1/4","correct":false},{"label":"3/4 and 2/4","correct":false}],"pairs":null,"retryNextMove":"Picture the circles aligned. Two fourths cover the same region as one half."},{"checkpointId":"create-equivalence","kind":"shade","prompt":"Start with 1/2 of a circle shaded. Split each half into 2 equal pieces, making 4 equal parts. Keep the same amount shaded by shading the matching number of fourths.","denominator":4,"correctNumerator":2,"choices":null,"pairs":null,"retryNextMove":"The shaded boundary must not move. Each original half becomes two fourths, so count the smaller parts inside the shaded half."},{"checkpointId":"explain-equivalence","kind":"select","prompt":"Complete 1/2 = 2/4 by selecting the precise explanation.","denominator":null,"correctNumerator":null,"choices":[{"label":"They are equivalent because they cover the same amount of the same-size whole.","correct":true},{"label":"They are equivalent because 2 and 4 are larger than 1 and 2.","correct":false},{"label":"They are not equivalent because their numerators and denominators are different.","correct":false}],"pairs":null,"retryNextMove":"Focus on the shaded area, not whether the numbers look different. Equivalent fractions name the same amount of the same whole."}],"adaptations":{"audio":false,"minimalText":true,"workedExample":false}};let step=0,port,token;const stage=document.querySelector('#stage'),feedback=document.querySelector('#feedback');function send(type,x={}){if(port)port.postMessage({type,token,...x})}window.addEventListener('message',e=>{if(e.data?.type==='lessonbend.init'&&e.ports[0]){token=e.data.token;port=e.ports[0];send('lessonbend.ready')}},{once:true});const audio=document.querySelector('#audio');if(module.adaptations.audio&&module.audioText&&speechSynthesis){audio.hidden=false;audio.onclick=()=>speechSynthesis.speak(new SpeechSynthesisUtterance(module.audioText))}function result(ok,s){feedback.className='feedback '+(ok?'success':'retry');feedback.innerHTML=ok?'✓ <b>Correct!</b> '+s.retryNextMove:'↻ <b>Try again.</b> '+s.retryNextMove;send('lessonbend.checkpoint',{checkpointId:s.checkpointId,outcome:ok?'mastered':'retry'});if(ok)setTimeout(()=>{step++;render()},800)}function path(i,n){let a=i*6.283/n-1.571,b=(i+1)*6.283/n-1.571,x=t=>100+90*Math.cos(t),y=t=>100+90*Math.sin(t);return 'M100 100 L'+x(a)+' '+y(a)+' A90 90 0 0 1 '+x(b)+' '+y(b)+' Z'}function render(){if(step>=module.steps.length){stage.innerHTML='<h2>Lesson complete</h2>';send('lessonbend.complete');return}let s=module.steps[step],n=s.denominator||2,chosen=new Set();document.querySelector('#progress').textContent='Step '+(step+1)+' of '+module.steps.length;stage.innerHTML='<h2>'+s.prompt+'</h2>';if(s.kind==='shade'){stage.innerHTML+='<svg viewBox="0 0 200 200" width="280">'+Array.from({length:n},(_,i)=>'<path class="sector" data-i="'+i+'" d="'+path(i,n)+'" tabindex="0" role="button" aria-pressed="false"></path>').join('')+'</svg><button class="choice" id="check">Check</button>';stage.querySelectorAll('.sector').forEach(p=>p.onclick=()=>{let i=+p.dataset.i;chosen.has(i)?chosen.delete(i):chosen.add(i);p.classList.toggle('selected');p.setAttribute('aria-pressed',chosen.has(i))});stage.querySelector('#check').onclick=()=>result(chosen.size===s.correctNumerator,s)}else{let items=s.kind==='select'?(s.choices||[]):(s.pairs||[]).map(p=>({label:p.left+' = '+p.right,correct:true}));stage.innerHTML+=items.map((x,i)=>'<button class="choice" data-i="'+i+'">'+x.label+'</button>').join('');stage.querySelectorAll('.choice').forEach((b,i)=>b.onclick=()=>result(items[i].correct,s))}}render()</script></body></html>
